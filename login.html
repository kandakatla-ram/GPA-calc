<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Log in — GPA Visualizer</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ══ AMBIENT DAY/NIGHT SCENE (same as the main app, for visual continuity) ══ -->
<div class="bg-scene" aria-hidden="true">
  <div class="bg-sky"></div>
  <div class="bg-ground"></div>
  <div class="bg-celestial-a"></div>
  <div class="bg-celestial-b"></div>
  <div class="bg-tree">
    <div class="bg-tree-canopy-v"></div>
    <div class="bg-tree-canopy-h"></div>
    <div class="bg-tree-trunk"></div>
  </div>
</div>

<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2"    y="11" width="3" height="7"  rx="1" fill="var(--blue)"   opacity=".5"/>
        <rect x="6.5"  y="5"  width="3" height="13" rx="1" fill="var(--green)"/>
        <rect x="11"   y="8"  width="3" height="10" rx="1" fill="var(--orange)" opacity=".75"/>
        <rect x="15.5" y="2"  width="3" height="16" rx="1" fill="var(--green)"/>
        <line x1="1" y1="13" x2="19" y2="13" stroke="var(--gline)" stroke-width="1.5"/>
      </svg>
      <span>GPA Visualizer</span>
    </div>

    <h1>Log in to StudentVUE</h1>
    <p class="sub">Pull in your real grades and see them visualized.</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form" autocomplete="on">
      <div class="login-field">
        <label for="f-id">Student ID / username</label>
        <input type="text" id="f-id" autocomplete="username" required/>
      </div>
      <div class="login-field">
        <label for="f-pw">Password</label>
        <input type="password" id="f-pw" autocomplete="current-password" required/>
      </div>
      <div class="login-field">
        <label for="f-domain">StudentVUE domain</label>
        <input type="text" id="f-domain" placeholder="yourdistrict.edupoint.com" autocomplete="off" required/>
      </div>
      <button type="submit" class="btn btn-primary login-submit" id="login-btn">Log in &amp; load grades</button>

      <label class="tos-check" for="f-tos">
        <input type="checkbox" id="f-tos"/>
        <span>
          I understand this tool is <strong>not affiliated with or endorsed by StudentVUE® or Edupoint Educational Systems LLC</strong>.
          It's built to help students understand their own grades better, and it does not store your credentials or grades.
          I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms &amp; Conditions</a>.
        </span>
      </label>
    </form>

    <div class="login-hint">
      Your grades are fetched once and kept only in this browser tab —<br/>
      closing the tab clears them.<br/>
      <a href="index.html">Skip — enter grades manually instead</a>
    </div>
  </div>
</div>

<footer class="global-footer">
  <a href="terms.html">Terms &amp; Conditions</a>
</footer>

<script>
  // Point this at wherever your studentvue-api server (server.js) is
  // running. Defaults to the local dev server from `npm start`.
  const API_BASE = 'http://localhost:3000';

  // Respect system dark-mode preference, same as the main app.
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  const form  = document.getElementById('login-form');
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  function clearError() {
    errEl.classList.remove('show');
    errEl.textContent = '';
  }
  function setLoading(loading) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Logging in…'
      : 'Log in &amp; load grades';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const domain    = document.getElementById('f-domain').value.trim();
    const studentId = document.getElementById('f-id').value.trim();
    const password  = document.getElementById('f-pw').value;
    const agreed    = document.getElementById('f-tos').checked;

    if (!domain || !studentId || !password) {
      showError('Please fill in all three fields.');
      return;
    }

    if (!agreed) {
      showError('Please agree to the Terms & Conditions to continue.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/api/grades`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, password, domain }),
      });

      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error('The API did not return a valid response. Is the server running?');
      }

      if (!res.ok) {
        throw new Error(data.error || `Request failed (HTTP ${res.status}).`);
      }

      if (!data.courses || !data.courses.length) {
        throw new Error('Logged in successfully, but no courses were found for the current reporting period.');
      }

      sessionStorage.setItem('svGrades', JSON.stringify(data));
      // Don't keep the password in memory/the DOM any longer than needed.
      document.getElementById('f-pw').value = '';
      window.location.href = 'index.html#sv';
    } catch (err) {
      const msg = (err && err.message) || '';
      if (msg.includes('Failed to fetch')) {
        showError(
          `Could not reach the API at ${API_BASE}. Make sure the studentvue-api server is running and reachable from this page.`
        );
      } else {
        showError(msg || 'Something went wrong. Please check your details and try again.');
      }
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
